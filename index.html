<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords" content="탄생화, 탄생꽃, 생일꽃">
        <meta name="description" content="내가 태어난 날의 탄생화는 무엇일지 알아본다.">
        <title>나의 탄생화는 무엇인가</title>
        <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="./styles/reset.css">
        <link rel="stylesheet" href="./styles/index.css">
        <script src="./scripts/index.js" defer></script>
    </head>
    <body>
        <main>
            <div class="title">
                <p>The Flower of my Birth Day</p>
                <h1>나의 탄생화 찾기</h1>
            </div>
            <div class="contents">
                <input type="number" id="user_birthday" placeholder="태어난 달을 숫자로 입력해주세요.">
                <button id="open_btn">나의 꽃말 만나기</button>
            </div>
            <!-- --------------------팝업 -->
            <div id="overlay" class="hidden">
                <div id="content">
                    <p class="subtitle">Birthday Month 12</p>
                    <div class="flower">
                        <p>꽃말 : 자기애, 자존심, 외로움</p>
                    </div>
                    <p class="result">
                        당신의 탄생화는<br>
                        <strong>수선화</strong>입니다.
                    </p>
                </div>
            </div>
        </main>
    </body>
    </html>
